services:
  backend:
    build: ./backend
    ports:
      - "5001:5001"
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5000:80"
    depends_on:
      - backend
    restart: unless-stopped
