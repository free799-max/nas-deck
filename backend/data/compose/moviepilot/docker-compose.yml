services:
  moviepilot:
    stdin_open: true
    tty: true
    container_name: moviepilot
    hostname: moviepilot
    ports:
    - 3002:3000/tcp
    - 3003:3001/tcp
    volumes:
    - /media:/media:rw
    - /opt/docker/moviepilot/moviepilot/config:/config:rw
    - /opt/docker/moviepilot/moviepilot/core:/moviepilot/.cloakbrowser:rw
    - /opt/docker/moviepilot/moviepilot/cache:/root/.cache:rw
    environment:
    - NGINX_PORT=3000
    - PORT=3001
    - PUID=0
    - PGID=0
    - UMASK=000
    - TZ=Asia/Shanghai
    - SUPERUSER=admin
    - SUPERUSER_PASSWORD=zztwq8RALtM7p0Vb
    - PIP_INDEX_URL=https://pypi.tuna.tsinghua.edu.cn/simple
    - UV_INDEX_URL=https://pypi.tuna.tsinghua.edu.cn/simple
    - DB_TYPE=postgresql
    - DB_POSTGRESQL_HOST=postgresql
    - DB_POSTGRESQL_PORT=5432
    - DB_POSTGRESQL_DATABASE=moviepilot
    - DB_POSTGRESQL_USERNAME=moviepilot
    - DB_POSTGRESQL_PASSWORD=za9hQ5gFxIcmDwNJ
    - CACHE_BACKEND_TYPE=redis
    - CACHE_BACKEND_URL=redis://:wYQyeYHygTC3lvYE@redis:6379
    restart: always
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    image: jxxghp/moviepilot-v2:latest
    labels:
    - nasdeck.compose.project=moviepilot
  redis:
    image: redis
    container_name: moviepilot-redis
    volumes:
    - /opt/docker/moviepilot/redis/data:/data:rw
    environment:
    - REDIS_PASSWORD=wYQyeYHygTC3lvYE
    command: redis-server --save 600 1 --requirepass wYQyeYHygTC3lvYE
    healthcheck:
      test:
      - CMD
      - redis-cli
      - --raw
      - incr
      - ping
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
    - nasdeck.compose.project=moviepilot
  postgresql:
    image: postgres
    container_name: moviepilot-postgresql
    restart: always
    environment:
      POSTGRES_DB: moviepilot
      POSTGRES_USER: moviepilot
      POSTGRES_PASSWORD: za9hQ5gFxIcmDwNJ
    volumes:
    - /opt/docker/moviepilot/postgresql/data:/var/lib/postgresql:rw
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U moviepilot -d moviepilot
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
    - nasdeck.compose.project=moviepilot
