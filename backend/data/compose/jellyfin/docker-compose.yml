services:
  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    ports:
    - 8096:8096/tcp
    volumes:
    - /opt/docker/jellyfin/jellyfin/config:/config:rw
    - /opt/docker/jellyfin/jellyfin/cache:/cache:rw
    privileged: true
    devices:
    - /dev/dri:/dev/dri
    restart: unless-stopped
    environment:
    - TZ=Asia/Shanghai
    labels:
    - nasdeck.compose.project=jellyfin
