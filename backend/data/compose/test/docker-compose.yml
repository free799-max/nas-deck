services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: test_jellyfin
    environment:
    - PUID=1000
    - PGID=1000
    - TZ=Asia/Shanghai
    ports:
    - 8096:8096
    volumes:
    - ./data/compose/test/config/jellyfin:/config
    - /data/media:/media
    restart: unless-stopped
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8096/health
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
    - nasdeck.compose.project=test
  moviepilot:
    image: jxxghp/moviepilot:latest
    container_name: test_moviepilot
    environment:
    - PUID=1000
    - PGID=1000
    - TZ=Asia/Shanghai
    - MOVIEPILOT_AUTO_UPDATE=false
    - MOVIEPILOT_DOWNLOAD_PATH=/data/downloads
    - MOVIEPILOT_LIBRARY_PATH=/data/media
    - MOVIEPILOT_QBITTORRENT_HOST=qbittorrent
    - MOVIEPILOT_QBITTORRENT_PORT=8080
    ports:
    - 3000:3000
    volumes:
    - ./data/compose/test/config/moviepilot:/config
    - /data/media:/media
    - /data/downloads:/downloads
    restart: unless-stopped
    depends_on:
    - qbittorrent
    labels:
    - nasdeck.compose.project=test
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: test_qbittorrent
    environment:
    - PUID=1000
    - PGID=1000
    - TZ=Asia/Shanghai
    - WEBUI_PORT=8080
    ports:
    - 8080:8080
    - 6881:6881
    - 6881:6881/udp
    volumes:
    - ./data/compose/test/config/qbittorrent:/config
    - /data/downloads:/downloads
    restart: unless-stopped
    labels:
    - nasdeck.compose.project=test
