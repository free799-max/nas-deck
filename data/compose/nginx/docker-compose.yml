version: '3.8'
services:
  nginx:
    image: nginx:latest
    container_name: nginx-web
    restart: always
    ports:
    - 80:80
    - 443:443
    volumes:
    - ./html:/usr/share/nginx/html
    - ./conf:/etc/nginx/conf.d
    - ./logs:/var/log/nginx
    labels:
    - nasdeck.compose.project=nginx
